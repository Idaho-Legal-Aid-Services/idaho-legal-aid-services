  description: 'Idaho Legal Aid Services provides free civil legal help to eligible low-income Idahoans. We help people across the state with issues like housing and evictions, family safety and stability, protection orders, public benefits, consumer problems, and support for older adults. Our team offers legal advice, brief services, and representation, and we work with community partners to improve access to justice. If you’re facing a civil legal problem and can’t afford an attorney, we’re here to help.'
