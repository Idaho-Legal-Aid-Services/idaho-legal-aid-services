# Negative Keywords - Terms that should prevent routing to specific intents
# These help reduce false positives and misroutes
# Format: intent -> [negative_keywords]

apply:
  # Don't route to apply if these criminal/out-of-scope terms are present
  negatives:
    - criminal
    - dui
    - dwi
    - felony
    - misdemeanor
    - arrested
    - jail
    - prison
    - immigration
    - visa
    - green card
    - deportation
    - patent
    - trademark
    - copyright
    - business formation
    - incorporation
    - oregon
    - washington state
    - montana
    - nevada
    - utah
    - wyoming

hotline:
  # Don't route to hotline when emergency indicators present
  negatives:
    - 911
    - emergency
    - breaking in
    - right now
    - immediately
    - dying
    - heart attack
    - call police
    # Don't route to hotline when debt collector context present
    # "debt collector keeps calling me" should route to consumer, not hotline
    - debt collector
    - bill collector
    - creditor
    - collection agency
    - collections agency
    - calling me at work
    - calling about debt
    - calling about a bill
    - cobrador
    - cobrador de deudas
    - me llama todos los dias
    - me llaman constantemente

offices:
  # Distinguish office location queries from other location terms
  negatives:
    - court location
    - courtroom
    - jail location
    - prison location

donations:
  # Prevent confusion with other "give" or "support" contexts
  negatives:
    - give up
    - give back custody
    - support order
    - child support
    - spousal support
    - support payment
    # Housing context - prevent "give it back" / deposit / rent misroutes
    - give it back
    - give me
    - gave me
    - took money
    - security deposit
    - deposit
    - landlord
    - rent
    - tenant
    - lease
    - eviction
    # Employment context - prevent "paycheck" / wage misroutes
    - paycheck
    - last paycheck
    - wages
    - employer
    - fired
    - terminated
    # Consumer context
    - debt
    - collector
    - garnishment
    - repossession

feedback:
  # Prevent routing feedback when user needs substantive help
  negatives:
    - need help with
    - help me with
    - can you help
    - how do i
    - retaliation
    - fired
    - terminated
    - employer

forms:
  # Don't route to forms when asking for legal advice about forms
  negatives:
    - fill out for me
    - complete for me
    - draft for me
    - write for me
    - what should i put
    - help me write

guides:
  # Distinguish guide requests from legal advice requests
  negatives:
    - should i
    - what are my chances
    - will i win
    - legal advice
    - tell me what to do

faq:
  # FAQ is for general info, not case-specific questions
  negatives:
    - my case
    - my situation
    - my landlord
    - my spouse
    - my husband
    - my wife
    - my employer

risk_detector:
  # Ensure senior risk detector doesn't capture all senior mentions
  negatives:
    - senior management
    - senior staff
    - senior developer
    - high school senior

services:
  # Don't let services overview capture specific intent queries
  negatives:
    - apply for
    - application
    - sign up
    - forms
    - guides

# Employment-related triggers (NEW - Coverage Gap Fix)
# Note: These are NOT out-of-scope - employment is in ILAS scope
topic_employment:
  triggers:
    - fired
    - wrongful termination
    - wrongfully terminated
    - laid off
    - unpaid wages
    - wage theft
    - not getting paid
    - employer owes me
    - final paycheck
    - work discrimination
    - workplace discrimination
    - hostile work environment
    - retaliation at work
    - sexual harassment work
    # Spanish
    - despedido
    - despedida
    - me despidieron
    - no me pagan
    - salario no pagado
    - discriminacion en el trabajo
    - acoso laboral

# Expungement - ALLOW through (NOT criminal) (NEW - Coverage Gap Fix)
# Expungement is often a civil process in Idaho
expungement_allow:
  # These queries should NOT be blocked by criminal negatives
  allow_through:
    - expunge
    - expungement
    - seal my record
    - seal record
    - clean my record
    - clear my record
    - background check help
    - withheld judgment
    - borrar mi record
    - sellar mi record
    - limpiar antecedentes
