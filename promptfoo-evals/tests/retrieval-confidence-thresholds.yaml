# ILAS Site Assistant — Retrieval confidence/refusal threshold contract tests
#
# Metrics:
# - rag-contract-meta-present
# - rag-citation-coverage
# - rag-low-confidence-refusal

- vars:
    question: "im raising my granddaughter because my daughter is on drugs... what are my legal options"
  assert:
    - type: javascript
      value: |
        const line = output.split('\n').find((l) => l.startsWith('[contract_meta]'));
        if (!line) return false;
        try {
          const meta = JSON.parse(line.slice('[contract_meta]'.length));
          return ['confidence', 'citations_count', 'response_type', 'response_mode', 'reason_code', 'decision_reason']
            .every((k) => Object.prototype.hasOwnProperty.call(meta, k));
        } catch (e) {
          return false;
        }
      metric: rag-contract-meta-present
    - type: javascript
      value: |
        const line = output.split('\n').find((l) => l.startsWith('[contract_meta]'));
        if (!line) return false;
        try {
          const meta = JSON.parse(line.slice('[contract_meta]'.length));
          return Number.isFinite(meta.citations_count) && meta.citations_count >= 1;
        } catch (e) {
          return false;
        }
      metric: rag-citation-coverage

